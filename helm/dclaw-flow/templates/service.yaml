apiVersion: v1
kind: Service
metadata:
  name: {{ include "dclaw-app.fullname" . }}-frontend
  labels:
    {{- include "dclaw-app.labels" . | nindent 4 }}
    component: frontend
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 80
      targetPort: {{ .Values.frontend.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "dclaw-app.selectorLabels" . | nindent 4 }}
    component: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dclaw-app.fullname" . }}-backend
  labels:
    {{- include "dclaw-app.labels" . | nindent 4 }}
    component: backend
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "dclaw-app.selectorLabels" . | nindent 4 }}
    component: backend
