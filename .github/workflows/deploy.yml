name: Deploy Flow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  HELM_RELEASE: dclaw-flow
  HELM_NAMESPACE: dclaw-flow

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy with Helm
        run: |
          export KUBECONFIG=kubeconfig
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm/dclaw-flow \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --create-namespace \
            --values ./helm/dclaw-flow/values.yaml \
            --set frontend.image.tag=${{ github.sha }} \
            --set backend.image.tag=${{ github.sha }} \
            --wait --timeout 5m

      - name: Verify deployment
        run: |
          export KUBECONFIG=kubeconfig
          kubectl get pods -n ${{ env.HELM_NAMESPACE }}
          kubectl get svc -n ${{ env.HELM_NAMESPACE }}
          kubectl get ingress -n ${{ env.HELM_NAMESPACE }}
